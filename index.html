<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<title>AI Image Tool</title>

<!-- Icône iPhone -->
<link rel="apple-touch-icon" href="flavicon.jpg">
<link rel="icon" type="image/jpeg" href="flavicon.jpg">

<!-- Mode application iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

body{
    margin:0;
    padding:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{
    padding:20px;
    max-width:500px;
    margin:auto;
}

h1{
    margin-top:30px;
}

input{
    margin-top:20px;
}

button{
    margin-top:15px;
    padding:14px 20px;
    border:none;
    border-radius:12px;
    background:#00bfff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:active{
    transform:scale(0.97);
}

#resetBtn{
    background:#ff4444;
}

img{
    width:100%;
    margin-top:25px;
    border-radius:16px;
}

#loading{
    margin-top:20px;
    color:#00bfff;
}

.small{
    opacity:0.7;
    font-size:13px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Image Tool</h1>

<p>Amélioration & suppression de fond IA</p>

<input type="file" id="imageInput" accept="image/*">

<br>

<button onclick="removeBg()">
Remove Background
</button>

<br>

<button id="resetBtn" onclick="resetApp()">
Reset
</button>

<div id="loading"></div>

<img id="result">

<div class="small">
Ajoute ce site à l’écran d’accueil iPhone pour l’utiliser comme une app.
</div>

</div>

<script>

const API_TOKEN = "TON_TOKEN_ICI";

window.onload = () => {

    const savedImage = localStorage.getItem("savedImage");

    if(savedImage){
        document.getElementById("result").src = savedImage;
    }

};

async function removeBg(){

    const file = document.getElementById('imageInput').files[0];

    if(!file){
        alert("Choisis une image");
        return;
    }

    document.getElementById("loading").innerText = "Traitement IA...";

    try{

        const response = await fetch(
        "https://api-inference.huggingface.co/models/briaai/RMBG-1.4",
        {
            method:"POST",
            headers:{
                "Authorization":"Bearer " + API_TOKEN
            },
            body:file
        });

        const blob = await response.blob();

        const reader = new FileReader();

        reader.onloadend = function(){

            const base64data = reader.result;

            document.getElementById("result").src = base64data;

            localStorage.setItem("savedImage", base64data);

        }

        reader.readAsDataURL(blob);

        document.getElementById("loading").innerText = "";

    }catch(error){

        document.getElementById("loading").innerText = "Erreur IA";

        console.error(error);

    }

}

function resetApp(){

    const confirmReset = confirm(
        "Effacer toutes les données sauvegardées ?"
    );

    if(confirmReset){

        localStorage.clear();

        document.getElementById("result").src = "";

        document.getElementById("imageInput").value = "";

        alert("Application réinitialisée");

    }

}

</script>

</body>

</html>
